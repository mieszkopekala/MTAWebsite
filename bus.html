<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Routes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>
/* --- Base & Night Mode --- */
body { margin:0; font-family:Helvetica,sans-serif; background:#fff; transition: background 0.3s ease, color 0.3s ease; }
body.night { background: linear-gradient(to bottom,#0f1720,#1b2634); color:white; }

/* --- Top Navbar --- */
.top-navbar {
  display:flex; justify-content:flex-start; gap:0;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
  padding:15px 30px; box-shadow:0 4px 20px rgba(0,0,0,0.5);
  position: sticky; top:0; z-index:100;
}

.top-navbar .top-btn {
  background: transparent; color:#fff; border:none; font-size:18px;
  padding:15px 30px; cursor:pointer; text-decoration:none; position:relative;
  font-weight:bold; overflow:hidden; transition: all 0.3s ease;
}
.top-navbar .top-btn::after {
  content: ''; position:absolute; left:0; bottom:0; width:0%; height:3px;
  background: linear-gradient(90deg,#00f6ff,#0039a6,#ee352e);
  transition: width 0.3s ease;
}
.top-navbar .top-btn:hover::after { width:100%; }
.top-navbar .top-btn:hover { transform: scale(1.1) translateY(-2px); color:#76a9eb; text-shadow:0 0 6px rgba(118,169,235,0.6); }

.top-navbar .top-btn:not(:last-child)::before {
  content:''; position:absolute; right:0; top:20%; width:2px; height:60%;
  background: linear-gradient(to bottom,#00f6ff,#0039a6,#ee352e); opacity:0.6;
  transition: all 0.3s ease;
}
.top-navbar .top-btn:hover::before { opacity:1; }

.black-section {
    background-color: #111;
    display: flex;
    flex-direction: column;
}

.banner {
    width: 100%;
    height: 250px;
    overflow: hidden;
    position: relative;
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 58%;
    display: block;
    transition: transform 0.5s ease;
}

.banner img:hover {
    transform: scale(1.05);
}

.bottom-navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 30px;
    position: relative;
}

.nav-buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

.nav-info {
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    font-size: 14px;
    font-weight: bold;
    z-index: 1;
}

.bottom-navbar button {
    font-size: 15px;
    padding: 12px 28px;
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    font-weight: bold;
}

.bottom-navbar button::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #600338, #23043e, #032a46, rgb(3, 94, 94));
    opacity: 0.2;
    transition: opacity 0.3s ease;
    filter: blur(20px);
    z-index: 0;
}

.bottom-navbar button:hover::before {
    opacity: 0.35;
}

.bottom-navbar button:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 25px rgba(2, 71, 71, 0.45);
    color: #76a9eb;
}

.bottom-navbar button span {
    position: relative;
    z-index: 1;
}

.weather-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.1;
    font-size: 18px;
}

#weather-icon {
    font-size: 28px;
    margin-bottom: 4px;
}

#weather-f {
    font-size: 15px;
}

#weather-c {
    font-size: 12px;
    opacity: 0.8;
}

#weather-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 250px;
    pointer-events: none;
    z-index: 2;
}

.divider {
    opacity: 0.6;
}

/* --- Service Ticker --- */
.service-ticker {
  background:#222; color:white; overflow:hidden; white-space:nowrap;
  padding:4px 0; font-weight:bold; font-size:14px; position:relative;
}
.service-ticker::before, .service-ticker::after {
  content:''; position:absolute; top:0; width:50px; height:100%; z-index:2; pointer-events:none;
}
.service-ticker::before { left:0; background:linear-gradient(to right,#222,transparent); }
.service-ticker::after { right:0; background:linear-gradient(to left,#222,transparent); }
.ticker-text { display:inline-block; padding-left:100%; animation:ticker 25s linear infinite; }
@keyframes ticker{0%{transform:translateX(0)} 100%{transform:translateX(-100%)}}

/* --- Bus Input Bar --- */
#bus-bar { text-align:center; margin:20px auto; }
#bus-bar label { font-size:18px; display:block; margin-bottom:10px; }
#bus-route { padding:10px 15px; font-size:16px; width:220px; border-radius:5px; border:1px solid #ccc; }

/* --- Bus Modal --- */
#bus-modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
#bus-modal .modal-content {
  background:white; margin:5% auto; padding:20px; border-radius:10px;
  width:90%; max-width:700px; text-align:center;
  transform:translateY(50px); opacity:0; transition:transform 0.3s ease, opacity 0.3s ease;
  position:relative;
}
#bus-modal.show .modal-content { transform:translateY(0); opacity:1; }

/* Close Button */
#bus-modal .close { position:absolute; top:10px; right:10px; font-size:28px; font-weight:bold; cursor:pointer; }

/* Map Label */
#map-label { position:absolute; top:10px; left:10px; font-weight:bold; font-size:16px; color:purple; }

/* Direction Buttons */
#bus-modal .direction-buttons {
  display:flex; justify-content:center; align-items:center; margin-bottom:15px;
}
#bus-modal .direction-buttons button {
  flex:1; padding:12px 25px; font-size:16px; font-weight:bold;
  cursor:pointer; border:none; background:white; color:purple; margin:0;
  transition: all 0.3s ease;
}
#bus-modal .direction-buttons button:hover { background:purple; color:white; }
#bus-modal .direction-buttons span { width:2px; background:#888; height:40px; display:inline-block; }

/* --- Map --- */
#bus-map { width:100%; height:550px; border-radius:10px; margin-top:10px; }
</style>
</head>
<body>

<!-- Top Navbar -->
<div class="top-navbar">
    <a href="website.html" class="top-btn">Home</a>
    <a href="https://www.mta.info/maps" class="top-btn">Maps</a>
    <a href="https://www.mta.info/alerts" class="top-btn">Service Changes</a>
    <a href="https://www.mta.info/contact-us" class="top-btn">Contact</a>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-body"></div>
    </div>
</div>

<!-- Banner + Bottom Navbar -->
<div class="black-section">

    <div class="banner">
        <img src="images/20240529_154723.jpg" alt="Banner">
    </div>

    <div class="bottom-navbar">

        <div class="nav-buttons">
            <a href="website.html"><button>Subway</button></a>
            <a href="bus.html"><button>Bus</button></a>
            <a href=""><button>Railroad</button></a>
        </div>

        <div class="nav-info">

            <div class="weather-box">
                <span id="weather-icon">☀️</span>
                <span id="weather-f">--°F</span>
                <span id="weather-c">--°C</span>
            </div>

            <span class="divider">|</span>

            <span id="nyc-time">--:--</span>

        </div>

    </div>
</div>

<!-- Service Ticker -->
<div class="service-ticker">
  <div class="ticker-text">⚠ No major bus service disruptions • Welcome to the NYC Bus Dashboard •</div>
</div>

<!-- Bus Input -->
<div id="bus-bar">
  <label for="bus-route">Enter Bus Route</label>
  <input id="bus-route" type="text" placeholder="ex. Q1, Bx12, M15">
</div>

<!-- Bus Modal -->
<div id="bus-modal">
  <div class="modal-content">
    <div id="map-label">Q1</div>
    <span class="close">&times;</span>
    <div class="direction-buttons">
      <button id="north-btn">Northbound</button>
      <span></span>
      <button id="south-btn">Southbound</button>
    </div>
    <div id="bus-map"></div>
  </div>
</div>

<script>
// --- Bus Routes ---
const busRoutes = {
  "Q1": {
    northbound:[[40.700992,-73.807842],[40.705609,-73.809628],[40.707799,-73.802542],[40.712552,-73.784222],[40.715664,-73.773854],[40.719359,-73.775628],[40.721265,-73.776544],[40.723543,-73.778172],[40.726116,-73.779698],[40.729485,-73.781276],[40.732966,-73.782915],[40.734067,-73.780146],[40.735111,-73.776692],[40.736371,-73.772484],[40.737963,-73.767635],[40.739242,-73.763268],[40.740951,-73.757905],[40.743439,-73.753917],[40.744289,-73.751042],[40.745058,-73.748355],[40.746330,-73.746153]],
    southbound:[[40.746330,-73.746153],[40.745889,-73.749087],[40.744225,-73.751557],[40.742315,-73.753888],[40.740755,-73.758674],[40.739105,-73.763994],[40.737424,-73.769245],[40.736387,-73.772603],[40.735068,-73.777081],[40.733965,-73.780649],[40.732839,-73.782913],[40.732809,-73.782928],[40.729382,-73.781311],[40.722750,-73.777746],[40.718179,-73.775084],[40.714857,-73.774660],[40.712768,-73.783391],[40.707614,-73.803218],[40.705275,-73.809494],[40.700992,-73.807842]]
  }
};

// --- Modal & Map ---
const busInput = document.getElementById('bus-route');
const busModal = document.getElementById('bus-modal');
const closeBtn = busModal.querySelector('.close');
const northBtn = document.getElementById('north-btn');
const southBtn = document.getElementById('south-btn');
let map, routeControl;

function initMap() {
  map = L.map('bus-map').setView([40.733,-73.78],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; OpenStreetMap contributors'
  }).addTo(map);
}

function drawRoute(stops){
  if(routeControl) map.removeControl(routeControl);
  const waypoints = stops.map(c=>L.latLng(c[0],c[1]));
  const plan = L.Routing.plan(waypoints,{
    createMarker:(i,wp,nWps)=>L.circleMarker(wp.latLng,{radius:6,color:'purple',fillColor:'purple',fillOpacity:1}),
    addWaypoints:false, draggableWaypoints:false, routeWhileDragging:false, show:false
  });
  routeControl = L.Routing.control({
    plan:plan, lineOptions:{styles:[{color:'purple',weight:5}]},
    addWaypoints:false, draggableWaypoints:false, routeWhileDragging:false, show:false
  }).addTo(map);
}

function showBusRoute(routeName){
  const route = busRoutes[routeName.trim().toUpperCase()];
  if(!route) return alert("Route not found!");
  busModal.style.display='block'; busModal.classList.add('show');
  if(!map) initMap();
  setTimeout(()=>{ map.invalidateSize(); drawRoute(route.northbound); },100);
  northBtn.onclick = ()=>drawRoute(route.northbound);
  southBtn.onclick = ()=>drawRoute(route.southbound);
}

// Enter key
busInput.addEventListener('keydown', e=>{ if(e.key==='Enter') showBusRoute(busInput.value); });

// Close modal
closeBtn.addEventListener('click', ()=>{ busModal.style.display='none'; busModal.classList.remove('show'); });
window.addEventListener('click', e=>{ if(e.target===busModal){ busModal.style.display='none'; busModal.classList.remove('show'); } });

// NYC Time
function updateNYCTime(){
    const now = new Date();
    const options={timeZone:"America/New_York",hour:"2-digit",minute:"2-digit"};
    const time = new Intl.DateTimeFormat("en-US",options).format(now);
    document.getElementById("nyc-time").textContent = time;
}
updateNYCTime();
setInterval(updateNYCTime,1000);

// NYC Weather
async function updateWeather(){
    try{
        const res = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=40.7128&longitude=-74.0060&current_weather=true&temperature_unit=fahrenheit&weathercode=true"
        );
        const data = await res.json();

        const f = Math.round(data.current_weather.temperature);
        const c = Math.round((f - 32) * 5/9);

        document.getElementById("weather-f").textContent = f + "°F";
        document.getElementById("weather-c").textContent = c + "°C";

        const code = data.current_weather.weathercode;
        let icon = "☀️";
        if([1,2,3].includes(code)) icon="⛅";
        else if([61,63,65].includes(code)) icon="🌧️";
        else if([71,73,75].includes(code)) icon="❄️";
        else if([95,96,99].includes(code)) icon="⛈️";
        else if(code===0) icon="☀️";
        else icon="🌤️";

        document.getElementById("weather-icon").textContent = icon;

    }catch{
        document.getElementById("weather-f").textContent="--°F";
        document.getElementById("weather-c").textContent="--°C";
        document.getElementById("weather-icon").textContent="❔";
    }
}
updateWeather();
setInterval(updateWeather,600000);

// Night Mode
const hour = new Date().getHours();
if(hour >= 19 || hour < 6) document.body.classList.add("night");

const canvas = document.getElementById("weather-canvas");
const ctx = canvas.getContext("2d");
let particles = [];

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function createParticles(type){
    particles = [];
    const count = type === 'snow' ? 80 : 60;
    for(let i=0;i<count;i++){
        particles.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            size: Math.random()*3+2,
            speedY: Math.random()*2+1,
            speedX: type==='rain'? Math.random()*2+2 : Math.random()*0.5-0.25
        });
    }
}

function animateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        if(p.speedX>1) ctx.fillRect(p.x,p.y,2,p.size*5);
        else ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
        p.x += p.speedX;
        p.y += p.speedY;
        if(p.y > canvas.height) p.y = -10;
        if(p.x > canvas.width) p.x = 0;
        if(p.x < 0) p.x = canvas.width;
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

function updateWeatherParticles(code){
    if([61,63,65].includes(code)) createParticles('rain');
    else if([71,73,75].includes(code)) createParticles('snow');
    else particles = [];
}
</script>

</body>
</html>
